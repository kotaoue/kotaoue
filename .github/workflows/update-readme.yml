name: Update README

on:
  schedule:
    - cron: '23 15 * * *'  # 0:23 JST (UTC+9) - odd minute avoids :00/:30 congestion on GitHub's shared scheduler, which can delay or skip triggers on low-activity repos
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Use the highest Go version required across all tools (compatible with all)
          go-version-file: tools/fetch-spotify/go.mod

      - name: Fetch Bookmeter wish list
        continue-on-error: true
        uses: kotaoue/fetch-bookmeter@92920a2911c3b4fd3607cfd7847e99c464b67aa2 # v1
        with:
          user-id: '104'
          output: ${{ github.workspace }}/wish.json

      - name: Fetch Spotify playlist
        continue-on-error: true
        working-directory: tools/fetch-spotify
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: go run . fetch-playlist -output $GITHUB_WORKSPACE/playlist.json

      - name: Combine RSS feeds
        continue-on-error: true
        uses: kotaoue/combine-rss-feeds@b553d15c79d4044d393adf1da7ccc25a8006eedc # v1.0.4
        with:
          feeds: |
            https://zenn.dev/kotaoue/feed
            https://qiita.com/kotaoue/feed
            https://note.com/kotaoue/rss
          limit: 5
          output_file: ${{ github.workspace }}/blog-entries.xml
          feed_title: "kotaoue's blog entries"

      - name: Update README with yesterday's step count
        continue-on-error: true
        working-directory: tools/fit
        env:
          GOOGLE_FIT_CLIENT_ID: ${{ secrets.GOOGLE_FIT_CLIENT_ID }}
          GOOGLE_FIT_CLIENT_SECRET: ${{ secrets.GOOGLE_FIT_CLIENT_SECRET }}
          GOOGLE_FIT_REFRESH_TOKEN: ${{ secrets.GOOGLE_FIT_REFRESH_TOKEN }}
        run: go run . -cmd update-pedometer -readme $GITHUB_WORKSPACE/README.md

      - name: Update README with random wish book
        continue-on-error: true
        working-directory: tools/fetch-bookmeter
        run: go run . update-readme -wish-file $GITHUB_WORKSPACE/wish.json -readme $GITHUB_WORKSPACE/README.md

      - name: Update README with random Spotify track
        continue-on-error: true
        working-directory: tools/fetch-spotify
        run: go run . update-readme -playlist-file $GITHUB_WORKSPACE/playlist.json -readme $GITHUB_WORKSPACE/README.md

      - name: Update README with recent blog entries
        continue-on-error: true
        working-directory: tools/rss-to-readme
        run: go run . -rss $GITHUB_WORKSPACE/blog-entries.xml -readme $GITHUB_WORKSPACE/README.md

      - name: Commit and push changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md playlist.json wish.json blog-entries.xml
          git diff --staged --quiet || git commit -m "chore: update README"
          git pull --rebase
          git push
