name: Update Wish Book

on:
  schedule:
    - cron: "0 16 * * *" # 1:00 JST (UTC+9)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/fetch-bookmeter/go.mod

      - name: Update README with random wish book
        working-directory: tools/fetch-bookmeter
        run: go run . update-readme -wish-file $GITHUB_WORKSPACE/wish.json -readme $GITHUB_WORKSPACE/README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update wish book"
          git push
