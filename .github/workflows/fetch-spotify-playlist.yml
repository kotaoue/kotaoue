name: Fetch Spotify Playlist

on:
  schedule:
    - cron: '0 17 * * *'  # 2:00 JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-playlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/fetch-spotify/go.mod

      - name: Fetch Spotify playlist
        working-directory: tools/fetch-spotify
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: go run . fetch-playlist -output $GITHUB_WORKSPACE/playlist.json

      - name: Commit and push playlist.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.json
          git diff --staged --quiet || git commit -m "chore: update playlist.json"
          git push
