name: Lint Markdown

on:
    pull_request:
        paths:
            - "**/*.md"

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Run cSpell
              uses: streetsidesoftware/cspell-action@v8
              with:
                  files: "**/*.md"
                  config: cspell.json

            - name: Run markdownlint
              uses: DavidAnson/markdownlint-cli2-action@v22
              with:
                  globs: "**/*.md"
